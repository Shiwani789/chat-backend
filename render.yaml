services:
  - type: web
    name: whatsapp-clone-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run db:push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
